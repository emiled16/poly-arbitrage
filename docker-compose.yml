services:
  minio:
    image: minio/minio:RELEASE.2025-02-28T09-55-16Z
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: ${POLY_ARB_MINIO_ACCESS_KEY:-minioadmin}
      MINIO_ROOT_PASSWORD: ${POLY_ARB_MINIO_SECRET_KEY:-minioadmin}
    ports:
      - "9000:9000"
      - "9001:9001"
    volumes:
      - ./artifacts/minio:/data
